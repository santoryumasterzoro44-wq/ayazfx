    <style>
        /* ========== CSS VARIABLES ========== */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #0d0d15;
            --bg-card: rgba(15, 15, 25, 0.6);
            --neon-green: #00ff88;
            --neon-cyan: #00e5ff;
            --neon-purple: #a855f7;
            --neon-pink: #ff00aa;
            --neon-blue: #0088ff;
            --neon-red: #ff0044;
            --youtube-red: #ff0033;
            --telegram-blue: #26a5e4;
            --capcut-white: #ffffff;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.06);
            --font-display: 'Orbitron', monospace;
            --font-body: 'Rajdhani', sans-serif;
            --font-ui: 'Inter', sans-serif;
            --transition-smooth: cubic-bezier(0.23, 1, 0.32, 1);
            --transition-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* ========== GLOBAL RESET ========== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
            font-size: 16px;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        img {
            max-width: 100%;
            display: block;
        }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--neon-green), var(--neon-cyan));
            border-radius: 3px;
        }

        ::selection {
            background: var(--neon-green);
            color: var(--bg-primary);
        }

        /* ========== PRELOADER ========== */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #preloader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .preloader-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .preloader-rings {
            position: relative;
            width: 160px;
            height: 160px;
        }

        .preloader-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
        }

        .preloader-ring:nth-child(1) {
            top: 0; left: 0; right: 0; bottom: 0;
            border-top-color: var(--neon-green);
            border-right-color: var(--neon-green);
            animation: preloaderSpin1 1.5s linear infinite;
            box-shadow: 0 0 15px var(--neon-green), inset 0 0 15px rgba(0, 255, 136, 0.1);
        }

        .preloader-ring:nth-child(2) {
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border-bottom-color: var(--neon-cyan);
            border-left-color: var(--neon-cyan);
            animation: preloaderSpin2 2s linear infinite;
            box-shadow: 0 0 15px var(--neon-cyan), inset 0 0 15px rgba(0, 229, 255, 0.1);
        }

        .preloader-ring:nth-child(3) {
            top: 30px; left: 30px; right: 30px; bottom: 30px;
            border-top-color: var(--neon-purple);
            border-right-color: var(--neon-purple);
            animation: preloaderSpin1 2.5s linear infinite reverse;
            box-shadow: 0 0 15px var(--neon-purple), inset 0 0 15px rgba(168, 85, 247, 0.1);
        }

        .preloader-core {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            background: radial-gradient(circle, var(--neon-green) 0%, transparent 70%);
            border-radius: 50%;
            animation: preloaderPulse 1.5s ease-in-out infinite;
        }

        .preloader-logo {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 8px;
            text-shadow: none;
            animation: preloaderGlow 2s ease-in-out infinite;
            position: relative;
        }

        .preloader-logo::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-green), var(--neon-cyan), transparent);
            animation: preloaderLine 2s ease-in-out infinite;
        }

        .preloader-status {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .preloader-bar-container {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            overflow: hidden;
        }

        .preloader-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-cyan));
            border-radius: 2px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--neon-green);
        }

        .preloader-percent {
            font-family: var(--font-display);
            font-size: 0.85rem;
            color: var(--neon-green);
            letter-spacing: 3px;
        }

        .preloader-text {
            font-family: var(--font-ui);
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        @keyframes preloaderSpin1 {
            to { transform: rotate(360deg); }
        }

        @keyframes preloaderSpin2 {
            to { transform: rotate(-360deg); }
        }

        @keyframes preloaderPulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.8); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
        }

        @keyframes preloaderGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.5); }
        }

        @keyframes preloaderLine {
            0%, 100% { opacity: 0.3; transform: scaleX(0.5); }
            50% { opacity: 1; transform: scaleX(1); }
        }

        /* ========== BACKGROUND SYSTEM ========== */
        .bg-system {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        /* Layer 1: Gradient Mesh */
        .bg-gradient-mesh {
            position: absolute;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(0, 255, 136, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(0, 229, 255, 0.03) 0%, transparent 50%),
                linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            animation: meshShift 20s ease-in-out infinite;
        }

        @keyframes meshShift {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(15deg); }
        }

        /* Layer 2: Neon Glow Blobs */
        .bg-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: blobFloat 20s ease-in-out infinite;
        }

        .bg-blob:nth-child(1) {
            width: 500px; height: 500px;
            background: var(--neon-green);
            top: -10%; left: -10%;
            animation-delay: 0s;
            animation-duration: 25s;
        }

        .bg-blob:nth-child(2) {
            width: 400px; height: 400px;
            background: var(--neon-purple);
            top: 50%; right: -10%;
            animation-delay: -5s;
            animation-duration: 30s;
        }

        .bg-blob:nth-child(3) {
            width: 350px; height: 350px;
            background: var(--neon-cyan);
            bottom: -10%; left: 30%;
            animation-delay: -10s;
            animation-duration: 22s;
        }

        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -30px) scale(1.1); }
            50% { transform: translate(-30px, 50px) scale(0.9); }
            75% { transform: translate(30px, 20px) scale(1.05); }
        }

        /* Layer 3: Particles Canvas */
        #particles-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* Layer 4: Cyber Grid */
        .bg-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 255, 136, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridScroll 30s linear infinite;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
        }

        @keyframes gridScroll {
            to { transform: translateY(60px); }
        }

        /* Layer 5: Mouse Glow */
        .mouse-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.08) 0%, transparent 70%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1;
            transition: opacity 0.3s ease;
            will-change: left, top;
        }

        /* Layer 6: Light Streaks */
        .bg-streaks {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .streak {
            position: absolute;
            width: 2px;
            height: 100px;
            background: linear-gradient(180deg, transparent, var(--neon-green), transparent);
            opacity: 0;
            animation: streakFall 8s linear infinite;
        }

        .streak:nth-child(1) { left: 10%; animation-delay: 0s; height: 80px; }
        .streak:nth-child(2) { left: 25%; animation-delay: 2s; height: 120px; }
        .streak:nth-child(3) { left: 45%; animation-delay: 4s; height: 60px; }
        .streak:nth-child(4) { left: 65%; animation-delay: 1s; height: 90px; }
        .streak:nth-child(5) { left: 85%; animation-delay: 3s; height: 110px; }
        .streak:nth-child(6) { left: 35%; animation-delay: 5s; height: 70px; }
        .streak:nth-child(7) { left: 75%; animation-delay: 6s; height: 100px; }
        .streak:nth-child(8) { left: 55%; animation-delay: 7s; height: 85px; }

        @keyframes streakFall {
            0% { top: -15%; opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { top: 110%; opacity: 0; }
        }

        /* ========== MAIN CONTENT WRAPPER ========== */
        .main-content {
            position: relative;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.8s ease 0.3s;
        }

        .main-content.visible {
            opacity: 1;
        }

        /* ========== NAVBAR ========== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 15px 0;
            transition: all 0.4s var(--transition-smooth);
        }

        .navbar.scrolled {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 255, 136, 0.1);
            padding: 10px 0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            cursor: pointer;
        }

        .nav-logo::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, var(--neon-green), transparent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s var(--transition-smooth);
        }

        .nav-logo:hover::after {
            transform: scaleX(1);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 35px;
            list-style: none;
        }

        .nav-link {
            font-family: var(--font-ui);
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
            position: relative;
            cursor: pointer;
            transition: color 0.3s ease;
            padding: 5px 0;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0%;
            height: 1px;
            background: var(--neon-green);
            transition: width 0.3s var(--transition-smooth);
            box-shadow: 0 0 5px var(--neon-green);
        }

        .nav-link:hover {
            color: var(--neon-green);
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        .nav-link.active {
            color: var(--neon-green);
        }

        /* Hamburger */
        .nav-hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 5px;
            z-index: 1001;
        }

        .hamburger-line {
            width: 25px;
            height: 2px;
            background: var(--neon-green);
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .nav-hamburger.active .hamburger-line:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .nav-hamburger.active .hamburger-line:nth-child(2) {
            opacity: 0;
            transform: translateX(10px);
        }

        .nav-hamburger.active .hamburger-line:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }
